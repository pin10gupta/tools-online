<!DOCTYPE html>
<html>
<head>
  <title>Age Calculator</title>
  <meta name="description" content="Calculate your age instantly.">
  <link rel="stylesheet" href="../css/style.css">
  <style>/* same styling as BMI */</style>
</head>
<body>

<header><h1>Age Calculator</h1></header>

<main>
  <div class="card">
    <p>Enter your date of birth to calculate age.</p>
    <input type="date" id="dob">
    <button onclick="calculateAge()">Calculate Age</button>
    <div class="result" id="ageResult"></div>
  </div>
</main>

<script>
function calculateAge() {
  const dob = new Date(document.getElementById('dob').value);
  if(!dob) return;
  const diff = Date.now() - dob.getTime();
  const ageDate = new Date(diff);
  const age = Math.abs(ageDate.getUTCFullYear() - 1970);
  document.getElementById('ageResult').innerText = "Your Age: " + age + " years";
}
</script>

</body>
</html>
