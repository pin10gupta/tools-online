<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Age Calculator - Tools Online</title>
</head>
<body>
  <h1>Age Calculator</h1>
  <p>Find your exact age in years, months, and days.</p>

  <label>Date of Birth: <input type="date" id="dob"></label>
  <button onclick="calculateAge()">Calculate</button>

  <p id="ageResult"></p>

  <script>
    function calculateAge() {
      let dob = new Date(document.getElementById("dob").value);
      let today = new Date();
      let years = today.getFullYear() - dob.getFullYear();
      let months = today.getMonth() - dob.getMonth();
      let days = today.getDate() - dob.getDate();

      if (days < 0) {
        months--;
        days += new Date(today.getFullYear(), today.getMonth(), 0).getDate();
      }
      if (months < 0) {
        years--;
        months += 12;
      }

      document.getElementById("ageResult").innerText =
        "You are " + years + " years, " + months + " months, and " + days + " days old.";
    }
  </script>

  <!-- Footer placed correctly -->
  <footer>© 2026 Tools Online | Created by Pintu Gupta</footer>

</body>
</html>
