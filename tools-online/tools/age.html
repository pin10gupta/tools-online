<!DOCTYPE html>
<html>
<head>
<title>Age Calculator</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<header><h1>Age Calculator</h1></header>

<main>

<div class="card">
<input type="date" id="dob"><br><br>
<button onclick="age()">Calculate</button>
<p id="out"></p>
</div>

<div class="card">
<p>This tool calculates your age instantly.</p>
</div>

</main>

<script>
function age(){
 let dob=new Date(document.getElementById("dob").value);
 let today=new Date();
 let age=today.getFullYear()-dob.getFullYear();
 document.getElementById("out").innerText="Age: "+age;
}
</script>

</body>
</html>
