<!DOCTYPE html>
<html>
<head>
<title>BMI Calculator</title>
<meta name="description" content="Calculate BMI easily.">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header><h1>🔧 Tools Online</h1></header>

<main>
<div class="card">
<h2>BMI Calculator</h2>
<input id="w" placeholder="Weight"><br><br>
<input id="h" placeholder="Height"><br><br>
<button onclick="calc()">Calculate</button>
<p id="res"></p>
</div>
</main>

<footer><p>© 2026 | @Pintu Gupta</p></footer>

<script>
function calc(){
 let w=document.getElementById("w").value;
 let h=document.getElementById("h").value;
 document.getElementById("res").innerText="BMI: "+(w/(h*h)).toFixed(2);
}
</script>

</body>
</html>
