<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BMI Calculator - Tools Online</title>
</head>
<body>
  <h1>BMI Calculator</h1>
  <p>Check your Body Mass Index instantly.</p>

  <label>Weight (kg): <input type="number" id="weight"></label><br>
  <label>Height (cm): <input type="number" id="height"></label><br>
  <button onclick="calculateBMI()">Calculate</button>

  <p id="bmiResult"></p>

  <script>
    function calculateBMI() {
      let weight = document.getElementById("weight").value;
      let height = document.getElementById("height").value / 100;
      let bmi = (weight / (height * height)).toFixed(2);
      let category = "";
      if (bmi < 18.5) category = "Underweight";
      else if (bmi < 25) category = "Normal weight";
      else if (bmi < 30) category = "Overweight";
      else category = "Obese";
      document.getElementById("bmiResult").innerText =
        "Your BMI: " + bmi + " (" + category + ")";
    }
  </script>

  <footer>© 2026 Tools Online | Created by Pintu Gupta</footer>
</body>
</html>
