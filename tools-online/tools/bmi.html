<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BMI Calculator - Tools Online">
  <title>BMI Calculator | Tools Online</title>
  <link rel="stylesheet" href="css/style.css">
  <style>/* same container/card styles as above */</style>
</head>
<body>
  <header></header>
  <div class="container">
    <h1>BMI Calculator</h1>
    <div class="adsense"></div>
    <label>Weight (kg)</label><input type="number" id="weight">
    <label>Height (cm)</label><input type="number" id="height">
    <button onclick="calcBMI()">Calculate BMI</button>
    <div class="result" id="bmiResult"></div>
    <div class="adsense"></div>
  </div>
  <footer></footer>
  <script>
    function calcBMI(){
      let w = parseFloat(document.getElementById('weight').value);
      let h = parseFloat(document.getElementById('height').value)/100;
      let bmi = w/(h*h);
      document.getElementById('bmiResult').textContent = "Your BMI is " + bmi.toFixed(2);
    }
  </script>
</body>
</html>
