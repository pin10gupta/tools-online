<!DOCTYPE html>
<html>
<head>
  <title>BMI Calculator</title>
  <meta name="description" content="Calculate your Body Mass Index (BMI) easily.">

  <!-- Google AdSense Verification -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5287925231378963"
       crossorigin="anonymous"></script>

  <style>
    body { font-family: Arial, sans-serif; background:#f9f9f9; margin:0; }
    header { background:#0078d7; color:#fff; padding:15px; text-align:center; }
    .card { background:#fff; padding:20px; margin:20px auto; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1); max-width:600px; text-align:center; }
    input { width:100%; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:5px; }
    button { background:#0078d7; color:#fff; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; }
    button:hover { background:#005fa3; }
    .result { margin-top:15px; font-weight:bold; }
  </style>
</head>
<body>

<header><h1>BMI Calculator</h1></header>

<main>
  <div class="card">
    <p>Enter your weight and height to calculate BMI.</p>
    <input type="number" id="weight" placeholder="Weight (kg)">
    <input type="number" id="height" placeholder="Height (cm)">
    <button onclick="calculateBMI()">Calculate BMI</button>
    <div class="result" id="bmiResult"></div>
  </div>
</main>

<script>
function calculateBMI() {
  const weight = document.getElementById('weight').value;
  const height = document.getElementById('height').value / 100;
  if(weight && height) {
    const bmi = (weight / (height * height)).toFixed(1);
    document.getElementById('bmiResult').innerText = "Your BMI: " + bmi;
  }
}
</script>

</body>
</html>
