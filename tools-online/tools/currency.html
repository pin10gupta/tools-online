<!DOCTYPE html>
<html>
<head>
  <title>Currency Converter</title>
  <meta name="description" content="Convert USD to INR instantly.">
  <style>
    body { font-family: Arial, sans-serif; background:#f9f9f9; margin:0; }
    header { background:#0078d7; color:#fff; padding:15px; text-align:center; }
    .card { background:#fff; padding:20px; margin:20px auto; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1); max-width:600px; text-align:center; }
    input { width:100%; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:5px; }
    button { background:#0078d7; color:#fff; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; }
    button:hover { background:#005fa3; }
    .result { margin-top:15px; font-weight:bold; }
  </style>
</head>
<body>

<header><h1>Currency Converter</h1></header>

<main>
  <div class="card">
    <p>Convert USD to INR.</p>
    <input type="number" id="usd" placeholder="USD">
    <button onclick="convertCurrency()">Convert</button>
    <div class="result" id="currencyResult"></div>
  </div>
</main>

<script>
function convertCurrency() {
  const usd = document.getElementById('usd').value;
  const rate = 83; // Example static rate, replace with live API if needed
  if(usd) {
    const inr = (usd * rate).toFixed(2);
    document.getElementById('currencyResult').innerText = usd + " USD = ₹" + inr + " INR";
  }
}
</script>

</body>
</html>
