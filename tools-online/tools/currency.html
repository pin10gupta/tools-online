<!DOCTYPE html>
<html>
<head>
    <title>Currency Converter</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<h2>Currency Converter (INR to USD)</h2>

<input type="number" id="inr" placeholder="Enter INR">
<button onclick="convertCurrency()">Convert</button>

<h3 id="result"></h3>

<script>
function convertCurrency() {
    let inr = document.getElementById("inr").value;
    let usd = inr / 83; // approx rate
    document.getElementById("result").innerText = "$ " + usd.toFixed(2);
}
</script>

</body>
</html>
