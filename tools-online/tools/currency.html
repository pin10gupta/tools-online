<!DOCTYPE html>
<html>
<head>
  <title>Currency Converter</title>
  <meta name="description" content="Convert USD to INR instantly.">
  <link rel="stylesheet" href="../css/style.css">
  <style>/* same styling as BMI */</style>
</head>
<body>

<header><h1>Currency Converter</h1></header>

<main>
  <div class="card">
    <p>Convert USD to INR.</p>
    <input type="number" id="usd" placeholder="USD">
    <button onclick="convertCurrency()">Convert</button>
    <div class="result" id="currencyResult"></div>
  </div>
</main>

<script>
function convertCurrency() {
  const usd = document.getElementById('usd').value;
  const rate = 83; // Example static rate, replace with live API if needed
  if(usd) {
    const inr = (usd * rate).toFixed(2);
    document.getElementById('currencyResult').innerText = usd + " USD = ₹" + inr + " INR";
  }
}
</script>

</body>
</html>
