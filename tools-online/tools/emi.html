<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EMI Calculator - Tools Online</title>
</head>
<body>
  <h1>EMI Calculator</h1>
  <p>Plan your loan repayments easily.</p>

  <label>Loan Amount (₹): <input type="number" id="loan"></label><br>
  <label>Annual Interest Rate (%): <input type="number" id="rate"></label><br>
  <label>Tenure (months): <input type="number" id="months"></label><br>
  <button onclick="calculateEMI()">Calculate</button>

  <p id="emiResult"></p>

  <script>
    function calculateEMI() {
      let loan = document.getElementById("loan").value;
      let rate = document.getElementById("rate").value / 12 / 100;
      let months = document.getElementById("months").value;
      let emi = (loan * rate * Math.pow(1 + rate, months)) /
                (Math.pow(1 + rate, months) - 1);
      document.getElementById("emiResult").innerText =
        "Your EMI: ₹" + emi.toFixed(2);
    }
  </script>

  <footer>© 2026 Tools Online | Created by Pintu Gupta</footer>
</body>
</html>
