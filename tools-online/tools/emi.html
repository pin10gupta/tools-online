<!DOCTYPE html>
<html>
<head>
    <title>EMI Calculator</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<h2>EMI Calculator</h2>

<label>Loan Amount:</label>
<input type="number" id="amount"><br><br>

<label>Interest Rate (%):</label>
<input type="number" id="rate"><br><br>

<label>Time (Years):</label>
<input type="number" id="time"><br><br>

<button onclick="calculateEMI()">Calculate</button>

<h3 id="result"></h3>

<script>
function calculateEMI() {
    let P = document.getElementById("amount").value;
    let r = document.getElementById("rate").value / 12 / 100;
    let n = document.getElementById("time").value * 12;

    let emi = (P * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
    document.getElementById("result").innerText = "EMI: ₹ " + emi.toFixed(2);
}
</script>

</body>
</html>
