<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Generator - Tools Online</title>
</head>
<body>
  <h1>Password Generator</h1>
  <p>Generate strong, secure passwords instantly.</p>

  <label>Password Length: <input type="number" id="length" value="12"></label>
  <button onclick="generatePassword()">Generate</button>

  <p id="password"></p>

  <script>
    function generatePassword() {
      let length = document.getElementById("length").value;
      let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()";
      let password = "";
      for (let i = 0; i < length; i++) {
        password += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      document.getElementById("password").innerText = "Generated Password: " + password;
    }
  </script>

  <footer>© 2026 Tools Online | Created by Pintu Gupta</footer>
</body>
</html>
