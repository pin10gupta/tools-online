<!DOCTYPE html>
<html>
<head>
<title>Password Generator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Password Generator</h1>
<nav><a href="index.html">Home</a></nav>
</header>

<main>

<div class="card">
<input id="len" placeholder="Length">
<button onclick="gen()">Generate</button>
<p id="out"></p>
</div>

</main>

<script>
function gen(){
let l=document.getElementById("len").value;
let c="abcABC123";
let p="";
for(let i=0;i<l;i++){
p+=c[Math.floor(Math.random()*c.length)];
}
document.getElementById("out").innerText=p;
}
</script>

</body>
</html>
