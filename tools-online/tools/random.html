<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Random Number Generator - Tools Online">
  <title>Random Number Generator | Tools Online</title>
  <link rel="stylesheet" href="css/style.css">

  <!-- Google AdSense Verification -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5287925231378963"
       crossorigin="anonymous"></script>

  <style>
    body { font-family: Arial, sans-serif; background:#f9f9f9; margin:0; }
    .container { max-width:600px; margin:50px auto; background:#fff; padding:30px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
    h1 { text-align:center; margin-bottom:20px; }
    label { display:block; margin:10px 0 5px; font-weight:bold; }
    input { width:100%; padding:10px; border:1px solid #ccc; border-radius:5px; }
    button { margin-top:20px; width:100%; padding:12px; background:#0078d7; color:#fff; border:none; border-radius:5px; font-size:16px; cursor:pointer; }
    button:hover { background:#005fa3; }
    .result { margin-top:20px; font-size:18px; text-align:center; }
    .adsense { margin:20px 0; text-align:center; }
  </style>
</head>
<body>
  <header><!-- Site header --></header>
  <div class="container">
    <h1>Random Number Generator</h1>
    <div class="adsense"><!-- AdSense code here --></div>
    <label>Min</label><input type="number" id="min" value="1">
    <label>Max</label><input type="number" id="max" value="100">
    <button onclick="genRand()">Generate</button>
    <div class="result" id="randResult"></div>
    <div class="adsense"><!-- Another AdSense block --></div>
  </div>
  <footer><!-- Site footer --></footer>
  <script>
    function genRand(){
      let min = parseInt(document.getElementById('min').value);
      let max = parseInt(document.getElementById('max').value);
      let num = Math.floor(Math.random()*(max-min+1))+min;
      document.getElementById('randResult').textContent = "Random number: "+num;
    }
  </script>
</body>
</html>
