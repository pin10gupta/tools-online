<!DOCTYPE html>
<html>
<head>
<title>Random Number</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<header>
<h1>Random Number Generator</h1>
<a href="../index.html">Home</a>
</header>

<main>
<button onclick="gen()">Generate</button>
<p id="num"></p>
</main>

<script>
function gen(){
 document.getElementById("num").innerText = Math.floor(Math.random()*100);
}
</script>

</body>
</html>
