<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Random Number Generator - Tools Online</title>
</head>
<body>
  <h1>Random Number Generator</h1>
  <p>Generate unbiased random numbers.</p>

  <label>Min: <input type="number" id="min" value="1"></label>
  <label>Max: <input type="number" id="max" value="100"></label>
  <button onclick="generateRandom()">Generate</button>

  <p id="randomResult"></p>

  <script>
    function generateRandom() {
      let min = parseInt(document.getElementById("min").value);
      let max = parseInt(document.getElementById("max").value);
      let random = Math.floor(Math.random() * (max - min + 1)) + min;
      document.getElementById("randomResult").innerText =
        "Random Number: " + random;
    }
  </script>

  <footer>© 2026 Tools Online | Created by Pintu Gupta</footer>
</body>
</html>
