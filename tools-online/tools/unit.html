<!DOCTYPE html>
<html>
<head>
  <title>Unit Converter</title>
  <meta name="description" content="Convert units like kilometers to miles easily.">

  <!-- Google AdSense Verification -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5287925231378963"
       crossorigin="anonymous"></script>

  <style>
    body { font-family: Arial, sans-serif; background:#f9f9f9; margin:0; }
    header { background:#0078d7; color:#fff; padding:15px; text-align:center; }
    .card { background:#fff; padding:20px; margin:20px auto; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1); max-width:600px; text-align:center; }
    input { width:100%; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:5px; }
    button { background:#0078d7; color:#fff; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; }
    button:hover { background:#005fa3; }
    .result { margin-top:15px; font-weight:bold; }
  </style>
</head>
<body>

<header><h1>Unit Converter</h1></header>

<main>
  <div class="card">
    <p>Convert kilometers to miles.</p>
    <input type="number" id="km" placeholder="Kilometers">
    <button onclick="convertKm()">Convert</button>
    <div class="result" id="unitResult"></div>
  </div>
</main>

<script>
function convertKm() {
  const km = document.getElementById('km').value;
  if(km) {
    const miles = (km * 0.621371).toFixed(2);
    document.getElementById('unitResult').innerText = km + " km = " + miles + " miles";
  }
}
</script>

</body>
</html>
