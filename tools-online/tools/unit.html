<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Unit Converter - Tools Online">
  <title>Unit Converter | Tools Online</title>
  <link rel="stylesheet" href="css/style.css">
  <style>/* same container/card styles */</style>
</head>
<body>
  <header></header>
  <div class="container">
    <h1>Unit Converter (km ↔ miles)</h1>
    <div class="adsense"></div>
    <input type="number" id="km" placeholder="Kilometers">
    <button onclick="toMiles()">Convert to Miles</button>
    <div class="result" id="unitResult"></div>
    <div class="adsense"></div>
  </div>
  <footer></footer>
  <script>
    function toMiles(){
      let km = parseFloat(document.getElementById('km').value);
      let miles = km*0.621371;
      document.getElementById('unitResult').textContent = km+" km = "+miles.toFixed(2)+" miles";
    }
  </script>
</body>
</html>
