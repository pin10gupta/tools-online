<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Word Counter - Tools Online</title>
</head>
<body>
  <h1>Word Counter</h1>
  <p>Count words and characters instantly.</p>

  <textarea id="textInput" rows="10" cols="50" placeholder="Type or paste text here..."></textarea><br>
  <button onclick="countWords()">Count</button>

  <p id="result"></p>

  <script>
    function countWords() {
      let text = document.getElementById("textInput").value.trim();
      let words = text.split(/\s+/).filter(word => word.length > 0).length;
      let chars = text.length;
      document.getElementById("result").innerHTML =
        "Words: " + words + " | Characters: " + chars;
    }
  </script>

 <!-- Footer placed correctly -->

</body>
</html>
